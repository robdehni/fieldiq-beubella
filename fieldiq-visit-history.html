<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Beu Bella Cosmetics — Visit History</title>  
<script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js" defer></script>
<script src="./brand-config.js" defer></script>  
<style>  
*{margin:0;padding:0;box-sizing:border-box}  
body{background:#f4f8fc;color:#0b1f3a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:20px 18px 40px;overflow-x:hidden}  
.container{max-width:780px;margin:0 auto;width:100%}  /* ── Brand block — matches fieldiq.html reference ── */
.topbar{margin-bottom:8px}
.topbar-brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.brand-cloud{font-size:26px;line-height:1}
.page-kind{font-size:10px;font-weight:800;letter-spacing:1.3px;color:#0d9488;text-transform:uppercase;margin-bottom:2px}
.brand-text h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:#0b1f3a}
.brand-text h1 span{color:#2f8fff}
.brand-text p{font-size:10px;color:#8a9bb3;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-top:2px}
.topbar-sub{color:#7a8aa3;font-size:12.5px;margin-top:2px;font-weight:600}

.home-btn{
display:inline-flex;align-items:center;gap:6px;background:#fff;color:#2f8fff;font-size:13px;font-weight:700;
text-decoration:none;padding:9px 16px;border-radius:30px;margin-bottom:18px;border:1px solid #e3ebf5;
box-shadow:0 2px 8px rgba(11,31,58,0.05);
}
.home-btn:hover{border-color:#2f8fff}

.filter-bar{background:#fff;border:1px solid #e3ebf5;border-radius:18px;padding:16px;margin-bottom:18px;box-shadow:0 4px 14px rgba(11,31,58,0.05)}
.filter-bar h3{font-size:11px;color:#8a9bb3;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-bottom:12px}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.filter-select{
width:100%;padding:11px;background:#f4f8fc;border:1.5px solid #dde8f5;border-radius:10px;color:#0b1f3a;
font-size:12.5px;outline:none;font-weight:600;
}
.filter-select:focus{border-color:#2f8fff}
.filter-btns{display:flex;gap:8px}
.fbtn-apply{flex:1;padding:11px;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;border:none;border-radius:10px;font-size:12.5px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(47,143,255,0.3)}
.fbtn-reset{flex:1;padding:11px;background:#fff;color:#7a8aa3;border:1.5px solid #e3ebf5;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer}
.filter-active{font-size:10.5px;color:#2f8fff;margin-top:8px;text-align:center;min-height:14px;font-weight:700}
.period-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.preset-btn{background:#eaf3ff;border:1.5px solid #cfe3ff;color:#1f6fe0;font-size:11.5px;font-weight:800;padding:8px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
.preset-btn:hover{background:#d5eaff}
.preset-btn.active{background:linear-gradient(135deg,#3d9bff,#1f6fe0);border-color:transparent;color:#fff;box-shadow:0 4px 10px rgba(47,143,255,0.28)}
.period-btn{background:#f4f8fc;border:1.5px solid #dde8f5;color:#5b6b85;font-size:11.5px;font-weight:800;padding:8px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
.period-btn:hover{border-color:#bcd8ff}
.period-btn.active{background:linear-gradient(135deg,#3d9bff,#1f6fe0);border-color:transparent;color:#fff;box-shadow:0 4px 10px rgba(47,143,255,0.28)}
.period-custom-panel{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.period-custom-panel .filter-select{width:auto;flex:1;min-width:120px}
.period-custom-sep{font-size:11.5px;color:#8a9bb3;font-weight:700}
.period-custom-apply{flex-shrink:0;padding:9px 14px}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.stat-pill{
background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:16px 14px;font-size:11.5px;
color:#7a8aa3;text-align:center;font-weight:700;box-shadow:0 4px 14px rgba(11,31,58,0.05);
}
.stat-pill span{display:block;font-size:26px;font-weight:800;color:#2f8fff;margin-bottom:4px}

.count-label{font-size:12px;color:#aab8cc;margin-bottom:14px;text-align:center;font-weight:600}

.visit-card{
background:#fff;border:1px solid #e3ebf5;border-radius:16px;padding:18px;margin-bottom:12px;
box-shadow:0 4px 14px rgba(11,31,58,0.05);cursor:pointer;transition:border-color 0.15s;
}
.visit-card.new-account{border-color:#bfe0ff;background:#f3f9ff}
.visit-card.expanded{border-color:#2f8fff}
.visit-card.command-centre-highlight{border-color:#2f8fff;box-shadow:0 0 0 3px rgba(47,143,255,0.18);position:relative}
.visit-card.command-centre-highlight::before{
  content:'Opened from Command Centre';position:absolute;top:-9px;left:14px;background:#2f8fff;color:#fff;
  font-size:9.5px;font-weight:800;letter-spacing:0.3px;text-transform:uppercase;padding:2px 9px;border-radius:999px;
}
.visit-card.rep-actions-highlight{border-color:#2f8fff;box-shadow:0 0 0 3px rgba(47,143,255,0.18);position:relative}
.visit-card.rep-actions-highlight::before{
  content:'Opened from Open Actions';position:absolute;top:-9px;left:14px;background:#2f8fff;color:#fff;
  font-size:9.5px;font-weight:800;letter-spacing:0.3px;text-transform:uppercase;padding:2px 9px;border-radius:999px;
}
.visit-card.map-highlight{border-color:#2f8fff;box-shadow:0 0 0 3px rgba(47,143,255,0.18);position:relative}
.visit-card.map-highlight::before{
  content:'Opened from Territory Map';position:absolute;top:-9px;left:14px;background:#2f8fff;color:#fff;
  font-size:9.5px;font-weight:800;letter-spacing:0.3px;text-transform:uppercase;padding:2px 9px;border-radius:999px;
}
.visit-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px}
.visit-header-main{flex:1;min-width:0}
.visit-subject{font-size:15px;font-weight:800;color:#0b1f3a;line-height:1.3;overflow-wrap:break-word;word-break:break-word}
.visit-account{font-size:12px;font-weight:700;color:#7a8aa3;margin-top:2px;overflow-wrap:break-word;word-break:break-word}
.visit-datetime{flex-shrink:0;text-align:right}
.visit-date-main{font-size:12px;font-weight:800;color:#0b1f3a;white-space:nowrap}
.visit-time-sub{font-size:10.5px;font-weight:700;color:#aab8cc;white-space:nowrap;margin-top:1px}
.visit-person-row{display:flex;align-items:center;gap:6px;margin-bottom:9px}
.visit-person-name{font-size:12px;font-weight:700;color:#3d4f6b}
.visit-person-unknown{color:#aab8cc;font-style:italic}
.visit-date{font-size:11.5px;color:#aab8cc;white-space:nowrap;font-weight:700}
.visit-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.badge{font-size:10.5px;padding:4px 11px;border-radius:8px;font-weight:700}
.badge-territory{background:#eef3f9;color:#5b6b85}
.badge-type{background:#eef3f9;color:#5b6b85}
.badge-high{background:#ffe5e8;color:#e0344a}
.badge-medium{background:#fff3e0;color:#d98a1c}
.badge-low{background:#e3f8ea;color:#1fa861}
.badge-new{background:#eaf3ff;color:#2f8fff}
.visit-summary{font-size:12.5px;color:#7a8aa3;line-height:1.6;margin-top:8px;padding-top:8px;border-top:1px solid #eef3f9}
.visit-card.expanded .visit-summary{display:none}

.visit-toggle{font-size:11px;color:#2f8fff;font-weight:700;margin-top:10px;text-align:center;user-select:none}
.visit-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #eef3f9}
.visit-detail.open{display:block}
.visit-detail .report-section{margin:10px 0}
.avf-list{display:flex;flex-direction:column;gap:6px}
.avf-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fbff;border:1px solid #e3ebf5;border-radius:10px;padding:8px 11px}
.avf-text{font-size:12.5px;color:#3d4f6b;font-weight:500;line-height:1.4}
.avf-badge{flex-shrink:0;font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px}
.avf-badge-completed{background:#e1f5ea;color:#1f8a52;border:1px solid #bfe9d0}
.avf-badge-dismissed{background:#eceef1;color:#6b7280;border:1px solid #dde1e6}
.avf-badge-pending{background:#eaf3ff;color:#2f8fff;border:1px solid #cfe3ff}
.visit-watch-row{margin:2px 0 8px}
.watch-star{border:none;background:none;color:#c8d0dc;font-size:17px;line-height:1;cursor:pointer;padding:0;margin-right:6px;flex-shrink:0;align-self:flex-start;margin-top:1px}
.watch-star.watching{color:#f0a400}
.watch-star:disabled{opacity:.5;cursor:not-allowed}
.watch-star-unresolved{color:#c8d0dc;opacity:.6}
.review-row{margin:0 0 14px}
.mark-reviewed-btn{background:#2f8fff;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer}
.mark-reviewed-btn:disabled{opacity:.6;cursor:not-allowed}
.reviewed-badge{display:inline-block;background:#e3f8ea;color:#1fa861;border-radius:999px;padding:6px 14px;font-size:12px;font-weight:800}
.visit-detail .report-section:first-child{margin-top:0}
.visit-detail .report-section h4{color:#2f8fff;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;font-weight:800}
.visit-detail .report-section p{color:#3d4f6b;font-size:13px;line-height:1.65}
.thread-toggle-btn{display:flex;align-items:center;gap:7px;width:100%;background:#eaf3ff;border:1px solid #d3e6ff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:800;color:#1f6fe0;cursor:pointer;text-align:left}
.thread-toggle-btn [data-lucide]{width:15px;height:15px}
.thread-toggle-arrow{margin-left:auto;font-size:11px}
.thread-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.thread-card{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e3ebf5;border-radius:10px;padding:10px 12px}
.thread-card-current{background:#f8fbff;border-color:#cfe3ff}
.thread-card-label{font-size:12.5px;font-weight:800;color:#0b1f3a;white-space:nowrap}
.thread-card-meta{flex:1;font-size:11.5px;color:#7a8aa3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.thread-card-action{flex-shrink:0}
.thread-card-status{font-size:11px;font-weight:700;color:#8a9bb3}
.thread-action-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;border:none;border-radius:9px;padding:10px;font-size:12.5px;font-weight:800;cursor:pointer}
.thread-nav-row{display:flex;gap:8px;margin-top:8px}
.thread-nav-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;border:none;border-radius:9px;padding:11px 8px;font-size:12px;font-weight:800;cursor:pointer;text-align:center;white-space:nowrap}
@media(max-width:480px){
.thread-nav-row{flex-direction:column}
.thread-nav-btn{width:100%}
}
.thread-action-btn [data-lucide]{width:14px;height:14px}
.thread-action-btn-small{width:auto;padding:6px 12px;font-size:11.5px}
.thread-nav-highlight{box-shadow:0 0 0 3px rgba(47,143,255,0.35);transition:box-shadow 0.3s ease}
.thread-summary-card{background:#f8fbff;border:1px solid #cfe3ff;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
.thread-summary-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px}
.thread-summary-label{color:#8a9bb3;font-weight:800;text-transform:uppercase;letter-spacing:.4px;font-size:10px;flex-shrink:0;white-space:nowrap}
.thread-summary-value{color:#0b1f3a;font-weight:700;text-align:right}
.thread-summary-jump{display:inline-block;margin-top:4px;font-size:12px;color:#2f8fff;font-weight:800;text-decoration:none}
.action-group{margin:10px 0}
.action-group-header{font-size:11px;font-weight:800;color:#1f6fe0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.action-group-toggle{display:block;width:100%;text-align:left;background:none;border:none;color:#7a8aa3;font-size:11.5px;font-weight:800;cursor:pointer;padding:4px 0;margin-bottom:6px}

.loading{text-align:center;padding:60px 20px;color:#aab8cc;font-weight:600}
.spinner{width:36px;height:36px;border:4px solid #eaf3ff;border-top:4px solid #2f8fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:#aab8cc;font-size:13.5px;padding:40px 20px;font-weight:600}

.footer{text-align:center;color:#aab8cc;font-size:11px;font-weight:600;margin-top:24px}

@media(min-width:768px){
.container{max-width:900px}
.visit-card{padding:22px 24px}
.visit-account{font-size:16.5px}
.stat-pill{padding:22px}
.stat-pill span{font-size:32px}
}
@media(min-width:1100px){
.container{max-width:1100px}
body{padding:32px 40px 60px}
}
.visit-card{width:100%;overflow-wrap:break-word;word-break:break-word}
.visit-summary{white-space:normal;overflow-wrap:break-word;word-break:break-word}
.visit-account{overflow-wrap:break-word;word-break:break-word}
[data-lucide]{display:inline-block;vertical-align:middle;stroke-width:1.8}
.visit-toggle [data-lucide]{width:12px;height:12px}

.photo-evidence{margin:10px 0;padding-top:10px;border-top:1px solid #eef3f9}
.photo-evidence h4{color:#2f8fff;font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;font-weight:800}
.photo-evidence-grid{display:flex;gap:8px;flex-wrap:wrap}
.photo-evidence-thumb{display:block;width:88px;height:88px;object-fit:cover;border-radius:8px;border:1px solid #dde8f5;cursor:pointer;transition:opacity 0.15s}
.photo-evidence-thumb:hover{opacity:0.82}
.photo-evidence-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#2f8fff;font-weight:700;text-decoration:none;padding:7px 11px;background:#eaf3ff;border-radius:8px;border:1px solid #cfe4ff}
.photo-evidence-link:hover{background:#d5eaff}

.photo-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(11,31,58,0.92);z-index:9999;align-items:center;justify-content:center;padding:20px}
.photo-modal-overlay.open{display:flex}
.photo-modal-img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain}
.photo-modal-close{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.back-to-top{
  position:fixed;right:18px;bottom:24px;width:44px;height:44px;border-radius:50%;
  background:#2f8fff;color:#fff;border:none;box-shadow:0 6px 16px rgba(47,143,255,0.35);
  display:none;align-items:center;justify-content:center;cursor:pointer;z-index:500;
  font-size:20px;font-weight:900;line-height:1;
}
.back-to-top.visible{display:flex}
p.page-subtitle{color:#7a8aa3;font-size:13px;margin-top:6px;font-weight:600;text-transform:none;letter-spacing:normal}
.avf-notes{margin-top:8px;padding-top:8px;border-top:1px dashed #e3ebf5;display:flex;flex-direction:column;gap:6px}
.avf-note-item{background:#fff;border:1px solid #e3ebf5;border-radius:9px;padding:8px 10px}
.avf-note-text{font-size:12px;color:#263b59;font-weight:600;line-height:1.5;white-space:pre-wrap}
.avf-note-meta{font-size:10px;color:#8a9bb3;font-weight:700;margin-top:4px}
.avf-note-status{font-size:10.5px;font-weight:900;margin-top:4px}
.avf-note-status.acked{color:#1f8a52}
.avf-note-status.not-acked{color:#a36a00}
</style>

<div class="container">  <div class="topbar">  
  <div class="topbar-brand">  
    <span class="brand-cloud">☁️</span>  
    <div class="brand-text">  
      <div class="page-kind">VISIT HISTORY</div>

      <p data-brand-tagline>by FieldIQ</p>

</div>  <a href="./index.html" id="homeBtn" class="home-btn">← Home</a>

<div id="filterBar" class="filter-bar" style="display:none">  
  <h3>Manager Filters</h3>  
  <div class="preset-row" id="presetRow">
    <button type="button" class="preset-btn" data-preset="today">My Visits Today</button>
    <button type="button" class="preset-btn" data-preset="thisWeek">My Visits This Week</button>
    <button type="button" class="preset-btn" data-preset="thisMonth">My Visits This Month</button>
    <button type="button" class="preset-btn preset-btn-manager-only" data-preset="teamActivity" style="display:none">Team Activity</button>
    <button type="button" class="preset-btn preset-btn-manager-only" data-preset="myActivity" style="display:none">My Activity</button>
  </div>
  <div class="period-row" id="periodRow">
    <button type="button" class="period-btn" data-period="today">Today</button>
    <button type="button" class="period-btn" data-period="thisWeek">This Week</button>
    <button type="button" class="period-btn" data-period="thisMonth">This Month</button>
    <button type="button" class="period-btn" data-period="30">30 Days</button>
    <button type="button" class="period-btn" data-period="90">90 Days</button>
    <button type="button" class="period-btn" data-period="180">180 Days</button>

    <button type="button" class="period-btn active" data-period="">All Time</button>
  </div>
  <div class="period-custom-panel" id="periodCustomPanel" style="display:none">
    <input type="date" class="filter-select" id="periodCustomStart" aria-label="Custom range start date">

    <input type="date" class="filter-select" id="periodCustomEnd" aria-label="Custom range end date">
    <button type="button" class="fbtn-apply period-custom-apply" id="periodCustomApplyBtn">Apply Range</button>
  </div>
  <div class="filter-row">  
    <select class="filter-select" id="filterRep">  
      <option value="">All Reps</option>  
    </select>

      <option>Ajman</option><option>Umm Al Quwain</option><option>Ras Al Khaimah</option><option>Fujairah</option>  
    </select>  
  </div>  
  <div class="filter-row">  
    <select class="filter-select" id="filterPriority">  
      <option value="">All Priorities</option>  
      <option>High</option><option>Medium</option><option>Low</option>  
    </select>  
    <select class="filter-select" id="filterPeriod" style="display:none">  
      <option value="">All Time</option>  
      <option value="today">Today</option>
      <option value="thisWeek">This Week</option>  
      <option value="lastWeek">Last Week</option>  
      <option value="thisMonth">This Month</option>

  </div>  
  <div class="filter-btns">  
    <button class="fbtn-apply" onclick="applyFilters()">Apply Filters</button>  
    <button class="fbtn-reset" onclick="resetFilters()">Reset</button>  
  </div>  
  <div class="filter-active" id="filterStatus"></div>

function formatDate(d){  
  if(!d)return'—';  
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});  
}  

function formatVisitDateTime(d){
  if(!d)return'—';
  var dt=new Date(d);
  if(isNaN(dt))return'—';
  var datePart=dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  if(String(d).indexOf('T')===-1)return datePart;
  var timePart=dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
  return datePart+', '+timePart;
}

function formatDateTimeLocal(v){
  if(!v)return'';
  try{return new Date(v).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
  catch(e){return v;}
}
  
function getPriorityClass(p){

  return'badge-medium';  
}  
  
function truncateSummary(text,n){  
  if(!text)return'';  
  var i=text.indexOf('VISIT SUMMARY');  
  var raw=(i>-1?text.substring(i+13):text).trim();  
  if(raw.length<=n)return raw;  
  var cut=raw.substring(0,n);  
  var lastPeriod=cut.lastIndexOf('. ');  
  if(lastPeriod>n*0.5){return cut.substring(0,lastPeriod+1).trim();}  
  var lastSpace=cut.lastIndexOf(' ');  
  if(lastSpace>-1){return cut.substring(0,lastSpace).trim()+'...';}  
  return cut.trim()+'...';  
}  
  
function parseFullReport(text){  
  var sections={summary:'',contacts:'',outcomes:'',nextSteps:'',signals:'',sentiment:''};  
  var lines=(text||'').split('\n'),current='';  
  for(var i=0;i<lines.length;i++){  
    var l=lines[i].trim();  
    if(l.match(/VISIT SUMMARY/i))current='summary';  
    else if(l.match(/KEY CONTACTS/i))current='contacts';  
    else if(l.match(/OUTCOMES/i))current='outcomes';  
    else if(l.match(/NEXT STEPS/i))current='nextSteps';  
    else if(l.match(/OPPORTUNITY/i))current='signals';  
    else if(l.match(/SENTIMENT/i))current='sentiment';  
    else if(l.match(/PRIORITY/i))current='';  
    else if(l&&current)sections[current]+=(sections[current]?'\n':'')+l;  
  }  
  return sections;  
}

// ── Owner-name resolution (thread summary only) ──────────────────────────
// Single shared cache for the life of the page. Managers reuse the exact
// same /get-users call populateRepFilter() already makes (see that
// function below, now routed through ensureUsersLoaded()) — no second
// manager-side request. Reps never call populateRepFilter() at all, so
// for them this is one new, non-blocking request, made only when a
// thread summary first needs a name. A failure here is swallowed inside
// the promise itself, so it can never block or break the rest of Visit
// History — callers always get a resolved (possibly still-empty) map.
var usersByRecordId={};
var _usersRawRecords=[];
var _usersLoadPromise=null;
function ensureUsersLoaded(){
  if(_usersLoadPromise)return _usersLoadPromise;
  _usersLoadPromise=fetch(WORKER+'/get-users',{headers:{'Authorization':'Bearer '+currentSessionToken}})
    .then(function(res){return res.json();})
    .then(function(data){
      _usersRawRecords=data.records||[];
      usersByRecordId={};
      _usersRawRecords.forEach(function(u){
        var f=u.fields||{};
        usersByRecordId[u.id]=(f['Display Name']||f['User ID']||'').trim();
      });
    })
    .catch(function(err){
      console.error('Could not load users for owner-name resolution:',err);
      // Deliberately does not rethrow — ensureUsersLoaded() must always
      // resolve, never reject, so a caller's .then() always runs.
    });
  return _usersLoadPromise;
}
function ownerNameFor(recordId){
  if(!recordId)return'Owner not assigned';
  var name=usersByRecordId[recordId];
  return name?name:'Owner unavailable';
}

// ── Thread-wide next-step action cache (thread summary only) ─────────────
// Page-level, keyed by visit ID. Prevents re-fetching the same visit's
// actions if the same thread summary is rebuilt (e.g. a visit is closed
// and reopened) or if the same visit happens to appear in more than one
// summary computation. Deliberately scoped to this new code path only —
// loadActionsForVisit()'s own existing fetch is untouched and does not
// share this cache.
var _actionsForVisitCache={};
function fetchActionsForVisitCached(visitId){
  if(_actionsForVisitCache[visitId])return _actionsForVisitCache[visitId];
  var p=fetch(WORKER+'/get-actions?visitId='+encodeURIComponent(visitId),{headers:{'Authorization':'Bearer '+currentSessionToken}})
    .then(function(res){
      if(!res.ok)throw new Error('HTTP '+res.status);
      return res.json();
    })
    .then(function(data){return data.records||[];})
    .catch(function(err){
      console.error('Could not load actions for visit',visitId,'(thread summary):',err);
      // A failed request must never look identical to "this visit
      // genuinely has zero actions" — resolving to [] here would let a
      // network error silently masquerade as "no active next step."
      // Delete the cache entry so this visit isn't permanently stuck on
      // a failed, resolved promise — a later retry can succeed.
      delete _actionsForVisitCache[visitId];
      throw err;
    });
  _actionsForVisitCache[visitId]=p;
  return p;
}
// Resolves the single earliest-due active (non-closed) action across every
// member of a thread. Promise.allSettled means one failed per-visit fetch
// never breaks the others or the summary itself — but a failure must still
// be visible to the caller rather than silently treated as "no actions."
// Returns {action, hadFailure} — action is null if none found OR if a
// failure means the result can't be trusted as complete; hadFailure is
// true if any thread-member's actions could not be loaded.
function resolveThreadNextStep(members){
  var fetches=members.map(function(m){return fetchActionsForVisitCached(m.id);});
  return Promise.allSettled(fetches).then(function(results){
    var allActions=[];
    var hadFailure=false;
    results.forEach(function(r){
      if(r.status==='fulfilled'&&Array.isArray(r.value)){allActions=allActions.concat(r.value);}
      else{hadFailure=true;}
    });
    var active=allActions.filter(function(a){
      var status=String((a.fields||{})['Status']||'Open').toLowerCase();
      return status!=='completed'&&status!=='dismissed'&&status!=='cancelled';
    });
    if(!active.length)return {action:null,hadFailure:hadFailure};
    active.sort(function(a,b){
      var da=(a.fields||{})['Due Date']||'';
      var db=(b.fields||{})['Due Date']||'';
      if(da&&db)return da<db?-1:(da>db?1:0);
      if(da&&!db)return -1;
      if(!da&&db)return 1;
      return 0;
    });
    return {action:active[0],hadFailure:hadFailure};
  });
}
// Builds the compact thread-summary card. Only ever called when a thread
// has 2+ members (see loadThreadForVisit's existing members.length<=1
// early return, unchanged). Renders synchronously with what's already
// known (member count, latest visit), then fills in Next Step/Owner/Due
// asynchronously once resolveThreadNextStep() and ensureUsersLoaded()
// both resolve — never blocks the rest of the detail panel.
function buildThreadSummary(members,threadId,currentId){
  _threadToggleCounter++;
  var summaryId='thread-summary-'+_threadToggleCounter;
  var container=document.createElement('div');
  container.className='thread-summary-card';
  container.id=summaryId;
  var latest=members.slice().sort(function(a,b){
    var da=a.fields['Visit Date']?new Date(a.fields['Visit Date']):new Date(0);
    var db=b.fields['Visit Date']?new Date(b.fields['Visit Date']):new Date(0);
    return db-da;
  })[0];
  var latestDate=latest.fields['Visit Date']?formatVisitDateTime(latest.fields['Visit Date']):'—';
  var latestRep=latest.fields['User Name']||'—';
  var jumpHtml=(latest.id!==currentId)
    ? '<a href="#" class="thread-summary-jump" data-visit-id="'+escapeHtmlLocal(latest.id)+'">Jump to latest visit →</a>'
    : '';
  container.innerHTML=
    '<div class="thread-summary-row"><span class="thread-summary-label">Linked visits</span><span class="thread-summary-value">'+members.length+'</span></div>'+
    '<div class="thread-summary-row"><span class="thread-summary-label">Latest</span><span class="thread-summary-value">'+escapeHtmlLocal(latestDate)+' — '+escapeHtmlLocal(latestRep)+'</span></div>'+
    '<div class="thread-summary-row" id="'+summaryId+'-nextstep"><span class="thread-summary-label">Next step</span><span class="thread-summary-value">Loading…</span></div>'+
    jumpHtml;
  resolveThreadNextStep(members).then(function(result){
    ensureUsersLoaded().then(function(){
      var row=document.getElementById(summaryId+'-nextstep');
      if(!row)return; // panel may have been collapsed/re-rendered by the time this resolves
      if(result.hadFailure){
        // At least one thread member's actions could not be loaded, so
        // this result is incomplete — never claim "no active next step"
        // when that claim can't actually be trusted.
        row.innerHTML='<span class="thread-summary-label">Next step</span><span class="thread-summary-value">Could not fully verify the next step</span>';
        return;

function loadThreadForVisit(detailEl,record){
  // Generation token guard against the duplicate-thread race: if this
  // function is called again for the same detailEl (card closed and
  // reopened, or reopened before a prior fetch resolved), only the most
  // recent call is ever allowed to write to the DOM. A stale call's
  // result is silently discarded rather than appended, regardless of
  // when its network request happens to resolve.
  detailEl._threadLoadToken=(detailEl._threadLoadToken||0)+1;
  var myToken=detailEl._threadLoadToken;
  detailEl._threadRecordId=record.id;
  // Guard used both by the async .then/.catch below AND is itself the
  // single source of truth for "is this specific call still the
  // authoritative one for this card, on this visit, while still open."
  function stillAuthoritative(){
    return detailEl._threadLoadToken===myToken &&
           detailEl.classList.contains('open') &&
           detailEl._threadRecordId===record.id;
  }
  var existing=detailEl.querySelector('.visit-thread-section');
  if(existing)existing.remove();
  var existingSummary=detailEl.querySelector('.thread-summary-card');
  if(existingSummary)existingSummary.remove();
  var threadId=(record.fields||{})['Visit Thread ID']||record.id;
  var fallback=document.createElement('div');
  fallback.className='report-section visit-thread-section';
  fallback.innerHTML='<div class="thread-card thread-card-current"><div class="thread-card-label">'+(threadId===record.id?'Original Visit':'This Visit')+'</div><div class="thread-card-action"><span class="thread-card-status">Currently viewing</span></div></div>';
  detailEl.appendChild(fallback);
  fetch(WORKER+'/get-visit-thread?threadId='+encodeURIComponent(threadId),{headers:{'Authorization':'Bearer '+currentSessionToken}})
    .then(function(res){return res.json();})
    .then(function(data){
      if(!stillAuthoritative())return; // a newer call, a close, or a different visit has superseded this one — write nothing
      var members=data.records||[];
      // Remove any existing thread summary/section immediately before
      // appending the authoritative replacement — guarantees at most one
      // of each ever exists, even if the fallback above was already
      // removed by a different code path in the meantime.
      var priorSection=detailEl.querySelector('.visit-thread-section');
      if(priorSection)priorSection.remove();
      var priorSummary=detailEl.querySelector('.thread-summary-card');
      if(priorSummary)priorSummary.remove();
      if(members.length<=1)return;
      var summaryEl=buildThreadSummary(members,threadId,record.id);
      detailEl.appendChild(summaryEl);
      _threadToggleCounter++;
      var toggleId='thread-toggle-'+_threadToggleCounter;
      var container=document.createElement('div');
      container.className='report-section visit-thread-section';
      var cardsHtml=renderThreadCards(members,threadId,record.id);
      container.innerHTML='<button type="button" class="thread-toggle-btn" id="'+toggleId+'-btn" onclick="event.stopPropagation();toggleThreadList(\''+toggleId+'\');">'+
          '📋 Thread ('+members.length+' Visit'+(members.length===1?'':'s')+')'+
          '<span id="'+toggleId+'-arrow" class="thread-toggle-arrow">▸</span>'+
        '</button>'+
        '<div id="'+toggleId+'-list" class="thread-list" style="display:none">'+cardsHtml+'</div>';
      detailEl.appendChild(container);
    })
    .catch(function(err){
      if(!stillAuthoritative())return;
      console.error('Could not load visit thread:',err);
    });
}

function getPeriodRange(period){

  if(period==='today'){var todayEnd=new Date(today);todayEnd.setHours(23,59,59,999);return {start:today,end:todayEnd};}
  if(period==='thisWeek'){return {start:thisMonday,end:null};}  
  if(period==='lastWeek'){var lastMonday=new Date(thisMonday);lastMonday.setDate(thisMonday.getDate()-7);var lastSunday=new Date(thisMonday);lastSunday.setDate(thisMonday.getDate()-1);lastSunday.setHours(23,59,59,999);return {start:lastMonday,end:lastSunday};}  
  if(period==='thisMonth'){return {start:new Date(now.getFullYear(),now.getMonth(),1),end:null};}  
  if(period==='lastMonth'){var lm=new Date(now.getFullYear(),now.getMonth()-1,1);var lmEnd=new Date(now.getFullYear(),now.getMonth(),0);lmEnd.setHours(23,59,59,999);return {start:lm,end:lmEnd};}  
  return {start:null,end:null};  
}

// Reflects the active period value onto the visible button row (adds/
// removes .active) and shows/hides the custom-range panel. Called after
// any period change — button click or URL/deep-link restore — so the UI

// select that all existing filtering logic already reads from.
function syncPeriodButtonsUI(value){

// Legacy period query-param values (lastWeek, lastMonth) predate the new
// button set and have no direct equivalent button. Rather than silently
// discarding them or jumping to All Time, their exact original date range
// is computed once via the existing getPeriodRange() logic and used to
// populate the Custom range inputs — so an old bookmarked or shared link
// still shows precisely the same visits it always did, just represented
// as an active Custom range instead of a dedicated button.
function mapLegacyPeriodParam(period){
  var known=['today','thisWeek','thisMonth','30','90','180','custom'];
  if(known.indexOf(period)>-1)return {selectValue:period};
  if(period==='lastWeek'||period==='lastMonth'){
    var r=getPeriodRange(period);
    return {selectValue:'custom',customStart:isoDateOnly(r.start),customEnd:isoDateOnly(r.end)};
  }
  // Any other/unrecognized legacy value: keep it as-is rather than
  // silently overriding to All Time. getPeriodRange() returns an empty
  // range for anything it doesn't recognize, which getFilteredRecords()
  // already handles safely (no filtering applied) — never a hard failure.
  return {selectValue:period};
}
  
// Single shared search matcher — previously this exact logic was
// duplicated in applyFilters() (manager path) and the separate rep
// quick-search listener, both only checking 4 fields. Unified here and
// extended to actually cover what the UI now says is searchable:
// account, subject/summary, person, role, date, time, territory, visit
// type, priority, and outcome. Both call sites below now use this one
// function so they can no longer drift out of sync with each other.
function recordMatchesSearch(r,q){
  if(!q)return true;
  var f=r.fields||{};
  var textFields=['Customer Name','AI Summary','Meeting Notes','Action Items','User Name','User Role','Territory','Visit Type','Priority','Outcome'];
  if(textFields.some(function(key){var v=f[key];return v&&String(v).toLowerCase().indexOf(q)>-1;}))return true;
  // Date/time: match against the same human-readable format the card
  // itself displays, since a typed query like "23 jul" or "14:20" won't
  // match a raw ISO string.
  if(f['Visit Date']){
    var formatted=formatVisitDateTime(f['Visit Date']).toLowerCase();
    if(formatted.indexOf(q)>-1)return true;
  }
  // Exact visit-record-ID lookup, for pasted/linked IDs.
  if(r.id&&r.id.toLowerCase().indexOf(q)>-1)return true;
  return false;
}

    if(mapped.selectValue==='custom'){
      document.getElementById('periodCustomStart').value=mapped.customStart||'';
      document.getElementById('periodCustomEnd').value=mapped.customEnd||'';
    }
    syncPeriodButtonsUI(mapped.selectValue);
  }
}

function expandAndScrollToVisit(recordId,memberRecord){  
  if(!recordId)return;  
  var card=document.querySelector('.visit-card[data-id="'+recordId+'"]');
  if(!card&&memberRecord){
    if(!allRecordsRaw.some(function(r){return r.id===recordId;})){
      allRecordsRaw=[memberRecord].concat(allRecordsRaw);
    }
    renderVisits(allRecordsRaw);
    card=document.querySelector('.visit-card[data-id="'+recordId+'"]');
  }
  if(!card)return;  
  var idx=card.getAttribute('data-idx');var detail=document.getElementById('detail-'+idx);var toggle=card.querySelector('.visit-toggle');  
  var _srcParams=new URLSearchParams(window.location.search);
  // Clear any highlight from every card before applying a new one. Without
  // this, navigating to a different visit (Jump to Latest, a thread-card
  // Open button, etc.) left the previously-highlighted card's class in
  // place while adding a new one to the newly-opened card — producing
  // more than one "Opened from Command Centre" card at once, and an
  // increasingly inconsistent set of highlighted cards over a session.
  document.querySelectorAll('.visit-card.command-centre-highlight,.visit-card.rep-actions-highlight,.visit-card.map-highlight').forEach(function(c){
    c.classList.remove('command-centre-highlight','rep-actions-highlight','map-highlight');
  });
  var _highlightClass=null;
  if(_srcParams.get('source')==='manager-home'||_srcParams.get('source')==='manager-actions'){
    _highlightClass='command-centre-highlight';
  }else if(_srcParams.get('source')==='rep-actions'){
    _highlightClass='rep-actions-highlight';
  }else if(_srcParams.get('source')==='map'){
    _highlightClass='map-highlight';
  }
  if(_highlightClass){
    card.classList.add(_highlightClass);
    _currentHighlight={visitId:recordId,cssClass:_highlightClass};
  }else{
    _currentHighlight={visitId:null,cssClass:null};
  }
  if(idx!==null&&sortedRecords[idx]){
    var hf=sortedRecords[idx].fields||{};
    var hLinkedAccountId=(hf['Account']&&hf['Account'][0])?hf['Account'][0]:null;
    if(!hLinkedAccountId){
      var hNormalizedName=String(hf['Customer Name']||'').trim().toLowerCase();
      if(hNormalizedName&&accountIdByName[hNormalizedName])hLinkedAccountId=accountIdByName[hNormalizedName];
    }
    var personRow=card.querySelector('.visit-person-row');
    if(personRow&&currentUser.role==='Manager'&&!personRow.querySelector('.watch-star')){
      var hStarHtml;
      if(hLinkedAccountId){
        var hIsWatched=!!watchedAccountIds[hLinkedAccountId];
        hStarHtml='<button class="watch-star'+(hIsWatched?' watching':'')+'" onclick="event.stopPropagation();toggleWatch(\''+hLinkedAccountId+'\',this)" data-account-id="'+hLinkedAccountId+'" aria-label="'+(hIsWatched?'Remove from watchlist':'Add to watchlist')+'" title="'+(hIsWatched?'Watching — tap to remove':'Tap to watch this account')+'">'+(hIsWatched?'⭐':'☆')+'</button>';
      }else{
        hStarHtml='<button class="watch-star watch-star-unresolved" disabled aria-label="Account not linked — cannot watch" title="This visit is not linked to an account record yet, so it cannot be watched.">☆</button>';
      }
      personRow.insertAdjacentHTML('afterbegin',hStarHtml);
    }
  }
  if(detail&&!detail.classList.contains('open')){  
    if(!detail.getAttribute('data-rendered')){var f=sortedRecords[idx].fields;detail.innerHTML=renderReviewButton(f,sortedRecords[idx].id)+renderFullReport(f['AI Summary']||f['Meeting Notes']||'')+renderPhotoEvidence(f['Photo URLs']||'',sortedRecords[idx].id);detail.setAttribute('data-rendered','1');loadActionsForVisit(detail,sortedRecords[idx].id);}
    loadThreadForVisit(detail,sortedRecords[idx]);
    detail.classList.add('open');card.classList.add('expanded');  
    if(toggle)toggle.innerHTML='<i data-lucide="chevron-up"></i> Tap to collapse';lucide.createIcons({el:toggle});  
  }  
  var _stickyBar=document.getElementById('mapNavControls');
  var _stickyOffset=0;
  if(_stickyBar&&_stickyBar.style.display==='flex'){
    _stickyOffset=_stickyBar.offsetHeight+12;
  }
  var _targetTop=card.getBoundingClientRect().top+(window.pageYOffset||document.documentElement.scrollTop||0)-_stickyOffset;
  window.scrollTo({top:_targetTop,behavior:'smooth'});
  card.classList.add('thread-nav-highlight');
  setTimeout(function(){card.classList.remove('thread-nav-highlight');},1700);
}  
  
var currentUser=null;
var currentSessionToken=localStorage.getItem('fieldiq_session_token');  
  
async function loadCurrentUser(){  
  var userId=localStorage.getItem('fieldiq_user_id');var userName=localStorage.getItem('fieldiq_user_name');var userRole=localStorage.getItem('fieldiq_user_role');  
  if(userId&&userName&&userRole){currentUser={userId:userId,name:userName,role:userRole};}  
}  
  
async function loadHistory(){  
  try{  
    if(!currentUser){  
      document.getElementById('visitList').innerHTML='<div class="empty">Please select your name on the Home screen before viewing Visit History.<br><br><a href="./index.html" style="display:inline-block;background:linear-gradient(135deg,#3d9bff,#1f6fe0);color:#fff;font-weight:700;text-decoration:none;padding:12px 28px;border-radius:12px;box-shadow:0 6px 16px rgba(47,143,255,0.3)">Return Home</a></div>';  
      document.getElementById('countLabel').textContent='';return;  
    }  
    var _incomingParams=new URLSearchParams(window.location.search);
    var endpoint=WORKER+'/get-visits';  
    if(currentUser.role!=='Manager'){
      endpoint=WORKER+'/get-visits?filterByUser='+encodeURIComponent(currentUser.userId);
    }
    var res=await fetch(endpoint,{cache:'no-store',headers:{'Authorization':'Bearer '+currentSessionToken}});
    if(res.status===401||res.status===403){
      localStorage.removeItem('fieldiq_user_id');localStorage.removeItem('fieldiq_user_name');localStorage.removeItem('fieldiq_user_role');localStorage.removeItem('fieldiq_user_record_id');localStorage.removeItem('fieldiq_session_token');
      window.location.href='./index.html';
      return;
    }
    var data=await res.json();  
    if(!res.ok)throw new Error(JSON.stringify(data));  
    allRecordsRaw=data.records||[];  
    try{
      var _fwParams=new URLSearchParams(window.location.search);
      var _fwVisitId=_fwParams.get('visitId');
      var _fwActionId=_fwParams.get('actionId');
      if(_fwVisitId&&_fwActionId&&!allRecordsRaw.some(function(r){return r.id===_fwVisitId;})){
        var _linkedRes=await fetch(WORKER+'/get-linked-visit?actionId='+encodeURIComponent(_fwActionId)+'&visitId='+encodeURIComponent(_fwVisitId),{headers:{'Authorization':'Bearer '+currentSessionToken}});
        if(_linkedRes.ok){
          var _linkedData=await _linkedRes.json();
          if(_linkedData.record&&_linkedData.record.id){allRecordsRaw=[_linkedData.record].concat(allRecordsRaw);}
        }
      }
    }catch(e){console.warn('Could not load linked Field Workflow visit:',e);}
    if(currentUser.role==='Manager'){
      try{
        var wlRes=await fetch(WORKER+'/get-watchlist',{headers:{'Authorization':'Bearer '+currentSessionToken}});
        var wlData=await wlRes.json();
        watchedAccountIds={};
        (wlData.records||[]).forEach(function(w){watchedAccountIds[w.id]=true;});
      }catch(e){watchedAccountIds={};}
      try{
        var accRes=await fetch(WORKER+'/get-accounts',{headers:{'Authorization':'Bearer '+currentSessionToken}});
        var accData=await accRes.json();
        accountIdByName={};
        (accData.records||[]).forEach(function(a){
          var name=String((a.fields||{})['Account Name']||'').trim().toLowerCase();
          if(name)accountIdByName[name]=a.id;
        });
      }catch(e){accountIdByName={};}
    }
    if(currentUser.role==='Manager'){  
      await populateRepFilter();document.getElementById('filterBar').style.display='block';  
      document.querySelectorAll('.preset-btn-manager-only').forEach(function(b){b.style.display='inline-block';});
      document.getElementById('repSearchBox').style.display='block';document.getElementById('repSearch').setAttribute('placeholder','Search visits, accounts or people…');
      applyUrlParams();applyFilters();  
      if(targetVisitId){expandAndScrollToVisit(targetVisitId);}else{restoreReturnStateIfAny();}  
    }else{  
      document.getElementById('repSearchBox').style.display='block';  
      targetVisitId=new URLSearchParams(window.location.search).get('visitId');  
      renderVisits(allRecordsRaw);  
      if(targetVisitId){expandAndScrollToVisit(targetVisitId);}else{restoreReturnStateIfAny();}  
    }  
  }catch(err){console.error('Visit History failed to load:',err);document.getElementById('visitList').innerHTML='<div class="empty">Could not load your visits. Please try again.</div>';}  
}

// One-touch presets — deliberately limited to what maps cleanly onto the
// existing period/rep filter state already wired above. "My Follow-ups",
// "My Completed", and "Needs Action" are NOT included here: Field Visit
// records carry no follow-up/completed/needs-action status themselves —
// that lives only on linked Action records, and accurately computing it
// per visit would require a new bulk actions fetch across every visit in
// the list, not a restyle. Flagged as a real gap, not silently omitted.
document.querySelectorAll('.preset-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    var preset=btn.getAttribute('data-preset');
    if(preset==='teamActivity'){
      document.getElementById('filterRep').value='';
      applyFilters();
      return;
    }
    if(preset==='myActivity'){
      var ownName=(currentUser&&currentUser.name)?currentUser.name.trim():'';
      if(ownName){ownName=ownName.charAt(0).toUpperCase()+ownName.slice(1).toLowerCase();}
      document.getElementById('filterRep').value=ownName;
      applyFilters();
      return;
    }
    // today / thisWeek / thisMonth — these are per-manager shortcuts, not
    // team-wide date filters: they must restrict to the current manager's
    // own visits AND the selected period together, using the same
    // display-name-based identity match myActivity already uses (the
    // only rep-matching mechanism this page's filtering path actually
    // supports — Visit records here carry User Name, not a linked User ID
    // field to compare against, so reusing that existing match keeps this
    // a single filtering system rather than introducing a second one).
    var shortcutOwnName=(currentUser&&currentUser.name)?currentUser.name.trim():'';
    if(shortcutOwnName){shortcutOwnName=shortcutOwnName.charAt(0).toUpperCase()+shortcutOwnName.slice(1).toLowerCase();}
    document.getElementById('filterRep').value=shortcutOwnName;
    document.getElementById('filterPeriod').value=preset;
    syncPeriodButtonsUI(preset);
    applyFilters();
  });
});

loadCurrentUser().then(function(){loadHistory();});
